<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Gamebar</title>

    <link rel="stylesheet" href="/Styles/adminloginstyles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Michroma&display=swap"
        rel="stylesheet">
</head>

<body>

    <main class="admin-main">

        <section class="admin-login-wrapper">

            <div class="admin-login-card">

                <div class="admin-badge">
                    <span>ADMIN</span>
                </div>

                <div class="admin-title">
                    <h1>Control Panel</h1>
                    <p>Secure access for Gamebar administrators only.</p>
                </div>

                <form class="admin-form">

                    <div class="input-group">
                        <label for="email">Admin Email</label>
                        <input type="email" id="email" placeholder="Enter admin email">
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter password">
                    </div>

                    <button type="submit" class="admin-login-btn">Login as Admin</button>

                </form>

                <div class="security-note">
                    <p>Protected admin gateway • Unauthorized access restricted</p>
                </div>

            </div>

        </section>

    </main>

    <script src="admin-login.js"></script>
</body>

</html>
